<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dots Generator</title>
<style>
  :root {
    --bg: #0e0e12;
    --panel: #16161b;
    --panel-2: #1d1d24;
    --panel-3: #23232c;
    --border: #28282f;
    --border-hover: #3a3a46;
    --text: #e8e8ed;
    --text-dim: #72728a;
    --text-mid: #a8a8bb;
    --accent: #f2f2f5;
    --accent-dim: #c9c9d4;
    --accent-glow: rgba(242,242,245,.08);
    --slider-fill: #2d2d37;
    --ease-out: cubic-bezier(.22, 1, .36, 1);
    --ease-spring: linear(0, .32 12%, .59 23%, .79 34%, .93 45%, 1.01 56%, 1.045 68%, 1.04 80%, 1.01 100%);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 13px;
  }
  .hidden { display: none !important; }

  /* ═══ SIDEBAR ═══ */
  aside {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Header */
  .sidebar-header {
    height: 60px;
    flex-shrink: 0;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 28px; height: 28px; flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 3px;
  }
  .logo-mark i {
    background: var(--accent);
    border-radius: 2px;
  }
  .logo-mark i:nth-child(2) { opacity:.3; }
  .logo-mark i:nth-child(4) { opacity:.55; }
  .logo-mark i:nth-child(6) { opacity:.15; }
  .logo-mark i:nth-child(8) { opacity:.7; }
  .logo-text h1 { font-size: 13.5px; font-weight: 700; letter-spacing: -.01em; }
  .logo-text p { font-size: 10.5px; color: var(--text-dim); margin-top: 1px; }

  /* Scroll area */
  .controls {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0 16px;
  }
  .controls::-webkit-scrollbar { width: 5px; }
  .controls::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .controls::-webkit-scrollbar-track { background: transparent; }

  /* ── Section groups ── */
  details.group {
    border-bottom: 1px solid var(--border);
  }
  details.group summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 18px;
    user-select: none;
    color: var(--text-mid);
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .065em;
    transition: color .12s;
  }
  details.group summary::-webkit-details-marker { display: none; }
  details.group[open] > summary { color: var(--text); }
  details.group summary .s-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border-hover);
    flex-shrink: 0;
    transition: background .15s;
  }
  details.group[open] > summary .s-dot { background: var(--accent); }
  details.group summary .s-arrow {
    margin-left: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 6px;
    color: var(--text-mid);
    font-size: 12px;
    line-height: 1;
    background: var(--panel-3);
    border: 1px solid var(--border);
    transition: transform .42s var(--ease-spring), color .15s, background .15s, border-color .15s;
  }
  details.group:not([open]) summary .s-arrow { transform: rotate(-90deg); }
  details.group[open] > summary .s-arrow { color: var(--accent); border-color: var(--accent-dim); }
  details.group summary:hover .s-arrow { color: var(--text); background: var(--border); border-color: var(--border-hover); }
  details.group summary:hover { color: var(--text); }

  /* group-body : colonne unique */
  .group-body {
    padding: 6px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  /* Animation accordéon (pilotée en JS) */
  details.group .group-anim {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows .32s var(--ease-out);
  }
  details.group .group-anim.collapsing { grid-template-rows: 0fr; }
  details.group .group-anim > .group-body {
    overflow: hidden;
    min-height: 0;
    transition: opacity .22s ease, transform .3s var(--ease-out);
  }
  details.group .group-anim.collapsing > .group-body { opacity: 0; transform: translateY(-6px); }

  /* ── Row : pilule slider — label à l'intérieur, valeur absolue à droite ── */
  .row {
    position: relative;
    height: 34px;
  }
  .row label {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-mid);
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
  }
  .row label::before {
    content: "";
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .row .val {
    position: absolute;
    right: 11px; top: 50%;
    transform: translateY(-50%);
    font-size: 11.5px;
    color: var(--text-mid);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    z-index: 1;
  }

  /* items avec label en haut, contrôle en dessous */
  .row-wide {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .row-wide > label:first-child {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .row-wide select { width: 100%; }

  /* ── Sliders : la piste occupe toute la pilule ── */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    cursor: ew-resize;
    border-radius: 8px;
    background: linear-gradient(to right, var(--slider-fill) 0% var(--pct,50%), var(--panel-2) var(--pct,50%) 100%);
  }
  .row input[type="range"] {
    position: absolute;
    inset: 0;
    height: 100%;
    margin: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 3px; height: 16px;
    border-radius: 2px;
    border: none;
    background: var(--text-dim);
    opacity: 0;
    transition: opacity .12s;
  }
  input[type="range"]::-moz-range-thumb {
    width: 3px; height: 16px;
    border-radius: 2px;
    border: none;
    background: var(--text-dim);
    opacity: 0;
    transition: opacity .12s;
  }
  input[type="range"]::-moz-range-track { background: transparent; }
  .row:hover input[type="range"]::-webkit-slider-thumb,
  input[type="range"]:focus-visible::-webkit-slider-thumb { opacity: 1; }
  .row:hover input[type="range"]::-moz-range-thumb,
  input[type="range"]:focus-visible::-moz-range-thumb { opacity: 1; }

  /* ── Accessibilité : focus visible + mouvement réduit ── */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  input[type="range"]:focus-visible { outline-offset: 0; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: .01ms !important;
      animation-duration: .01ms !important;
    }
  }

  /* ── Dims dropdown ── */
  .dims-wrap {
    position: relative;
  }
  .dims-badge {
    font-size: 11.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .12s, color .12s;
    white-space: nowrap;
  }
  .dims-badge:hover, .dims-wrap.open .dims-badge {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .dims-popover {
    display: none;
    position: absolute;
    top: calc(100% + 7px);
    left: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 50;
  }
  .dims-wrap.open .dims-popover { display: block; }
  .dims-popover-title {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── Selects ── */
  select {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 8px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    width: 100%;
    flex: 1;
  }
  select:focus { border-color: var(--accent-dim); }

  /* ── Inputs number ── */
  .dim-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0 10px;
  }
  .dim-row input[type="number"] {
    flex: 1;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 7px 9px;
    font-size: 12.5px;
    outline: none;
    text-align: center;
  }
  .dim-row input:focus { border-color: var(--accent-dim); }
  .dim-sep { color: var(--text-dim); font-size: 12px; }

  /* ── Segmented control ── */
  .seg {
    position: relative;
    display: flex;
    width: 100%;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg::before {
    /* indicateur coulissant */
    content: "";
    position: absolute;
    top: 2px; bottom: 2px; left: 2px;
    width: calc((100% - 4px) / var(--seg-n, 3));
    border-radius: 6px;
    background: var(--accent);
    transform: translateX(calc(var(--seg-i, 0) * 100%));
    transition: transform .42s var(--ease-spring);
  }
  .seg button {
    position: relative;
    z-index: 1;
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11.5px;
    padding: 7px 4px;
    cursor: pointer;
    transition: color .2s var(--ease-out);
    font-weight: 500;
  }
  .seg button.active {
    color: #101014;
    font-weight: 700;
  }
  .seg button:not(.active):hover { color: var(--text); }

  /* ── Mode grid ── */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 5px;
    margin: 2px 0 8px;
  }
  .mode-grid button {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 9px;
    padding: 9px 2px 7px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    font-size: 9.5px;
    font-weight: 500;
    transition: all .12s;
    line-height: 1;
  }
  .mode-grid button svg { width: 20px; height: 20px; }
  .mode-grid button.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .mode-grid button:not(.active):hover { border-color: var(--border-hover); color: var(--text-mid); }

  /* ── Mode params card ── */
  #modeParamsCard {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 4px 10px 8px;
    margin: 2px 0 4px;
  }
  /* mode params card hérite du même layout 2 colonnes */

  /* ── Menus déroulants sur mesure ── */
  .dd { position: relative; width: 100%; }
  .dd-trigger {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    width: 100%;
    height: 32px;
    padding: 0 10px;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 11.5px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color .15s var(--ease-out);
  }
  .dd-trigger:hover, .dd.open .dd-trigger { border-color: var(--border-hover); }
  .dd-chevron { color: var(--text-dim); transition: transform .34s var(--ease-spring); flex-shrink: 0; }
  .dd.open .dd-chevron { transform: rotate(180deg); }
  .dd-menu {
    position: fixed;
    background: var(--panel-2);
    border: 1px solid var(--border-hover);
    border-radius: 10px;
    padding: 4px;
    z-index: 250;
    box-shadow: 0 12px 32px rgba(0,0,0,.5);
    animation: surgir .24s var(--ease-out);
    transform-origin: top;
  }
  .dd-menu[hidden] { display: none; }
  .dd-menu [data-value] {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 7px 9px;
    background: none;
    border: none;
    border-radius: 7px;
    color: var(--text-mid);
    font-size: 11.5px;
    cursor: pointer;
    text-align: left;
    transition: background .12s, color .12s;
  }
  .dd-menu [data-value]:hover, .dd-menu [data-value]:focus-visible { background: var(--panel-3); color: var(--text); }
  .dd-menu [data-value].active { color: var(--text); font-weight: 600; }
  .dd-menu [data-value].active::after { content: "✓"; font-weight: 700; }

  /* ── Presets pills ── */
  .presets {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin: 8px 0 2px;
  }
  .palette-pill {
    display: flex;
    height: 26px;
    padding: 0;
    border: 1px solid var(--border);
    border-radius: 7px;
    overflow: hidden;
    cursor: pointer;
    background: none;
    transition: border-color .12s, transform .12s;
  }
  .palette-pill span { flex: 1; }
  .palette-pill:hover { border-color: var(--border-hover); transform: translateY(-1px); }
  .palette-pill.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .sub-label {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
  }

  /* Size presets: 2 cols grid */
  .size-presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin: 8px 0 2px;
  }
  .size-presets button {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: all .1s;
    text-align: left;
  }
  .size-presets button:hover { border-color: var(--accent-dim); color: var(--text); }
  .size-presets button .size-dims {
    font-size: 9.5px;
    color: var(--text-dim);
    display: block;
    margin-top: 1px;
  }

  /* ── Couleurs actives ── */
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 8px 0 6px;
  }
  .swatch {
    position: relative;
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1px solid var(--border);
    cursor: grab;
    overflow: hidden;
    transition: transform .12s, border-color .12s, opacity .12s;
  }
  .swatch::after {
    /* liseré interne : les couleurs claires restent lisibles sur le panneau */
    content: "";
    position: absolute; inset: 0;
    border-radius: 7px;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    pointer-events: none;
  }
  .swatch:hover { transform: translateY(-2px); border-color: var(--border-hover); }
  .swatch.dragging { opacity: .35; cursor: grabbing; }
  .swatch.drag-over { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .swatch-color {
    position: absolute; inset: 0;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .swatch .del {
    position: absolute;
    top: 0; right: 0;
    width: 15px; height: 15px;
    background: rgba(0,0,0,.72);
    color: #fff;
    font-size: 10px;
    line-height: 15px;
    text-align: center;
    border: none;
    border-radius: 0 0 0 6px;
    opacity: 0;
    z-index: 2;
    cursor: pointer;
    transition: opacity .12s;
  }
  .swatch:hover .del, .swatch .del:focus-visible { opacity: 1; }
  .swatch-add {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1.5px dashed var(--border);
    background: none;
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .1s;
    flex-shrink: 0;
  }
  .swatch-add:hover:not(:disabled) { border-color: var(--accent-dim); color: var(--accent); }
  .swatch-add:disabled { opacity: .35; cursor: not-allowed; }

  /* ── Pastille couleur du fond ── */
  .mini-swatch {
    width: 34px; height: 26px;
    border: 1px solid var(--border);
    border-radius: 7px;
    cursor: pointer;
    flex-shrink: 0;
    padding: 0;
    transition: border-color .12s, transform .12s;
  }
  .mini-swatch:hover { border-color: var(--border-hover); transform: translateY(-1px); }

  /* ── Sélecteur de couleur ── */
  .picker {
    position: fixed;
    z-index: 300;
    width: 218px;
    background: var(--panel-2);
    border: 1px solid var(--border-hover);
    border-radius: 12px;
    padding: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,.55);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .picker[hidden] { display: none; }
  .picker-sv {
    position: relative;
    height: 140px;
    border-radius: 9px;
    background: hsl(var(--hue, 120) 100% 50%);
    cursor: crosshair;
  }
  .picker-sv::before, .picker-sv::after {
    content: "";
    position: absolute; inset: 0;
    border-radius: 9px;
    pointer-events: none;
  }
  .picker-sv::before { background: linear-gradient(to right, #fff, transparent); }
  .picker-sv::after { background: linear-gradient(to top, #000, transparent); }
  .picker-cursor {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1.5px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.35);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 1;
  }
  .picker .picker-hue {
    height: 14px;
    border-radius: 7px;
    background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
    cursor: pointer;
  }
  .picker .picker-hue::-webkit-slider-thumb {
    opacity: 1;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: hsl(var(--hue, 120) 100% 50%);
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,.4);
  }
  .picker .picker-hue::-moz-range-thumb {
    opacity: 1;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: hsl(var(--hue, 120) 100% 50%);
    border: 2.5px solid #fff;
    box-shadow: 0 0 0 1px rgba(0,0,0,.4);
  }
  .picker-foot {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .picker-chip {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .picker-hex {
    flex: 1;
    min-width: 0;
    height: 30px;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0 9px;
    color: var(--text);
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .picker-hex:focus { border-color: var(--accent-dim); outline: none; }
  .picker-eyedrop {
    width: 30px; height: 30px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-mid);
    cursor: pointer;
    transition: border-color .12s, color .12s;
  }
  .picker-eyedrop:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* ── Toggle switch ── */
  .toggle {
    display: inline-flex;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle input[type="checkbox"] {
    position: absolute; opacity: 0; width: 0; height: 0;
  }
  .toggle-track {
    width: 30px; height: 17px;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 9px;
    position: relative;
    transition: background .15s, border-color .15s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    background: var(--text-dim);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform .38s var(--ease-spring), background .18s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked ~ .toggle-track::after { transform: translateX(13px); background: #101014; }

  /* ── Export footer ── */
  .sidebar-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .export-primary {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .scale-select {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 8px 6px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    width: 52px;
    text-align: center;
  }
  .btn-export-png {
    height: 30px;
    background: var(--accent);
    color: #101014;
    border: none;
    border-radius: 7px;
    padding: 0 14px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s;
    white-space: nowrap;
  }
  .btn-export-png:hover { background: #dcdce2; }
  .export-secondary { display: flex; gap: 6px; }
  .btn-ghost {
    flex: 1;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-mid);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all .12s;
  }
  .btn-ghost:hover { border-color: var(--accent-dim); color: var(--text); }

  /* Sidebar footer : seed + randomize */
  .btn-randomize-full {
    width: 100%;
    background: var(--accent);
    color: #101014;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background .12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn-randomize-full:hover { background: #dcdce2; }
  .btn-reseed-full {
    width: 100%;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-mid);
    border-radius: 8px;
    padding: 9px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .12s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .btn-reseed-full:hover { border-color: var(--border-hover); color: var(--text); }

  /* ── Export dropdown ── */
  .export-wrap {
    position: relative;
  }
  .btn-export-main {
    height: 30px;
    background: var(--accent);
    color: #101014;
    border: none;
    border-radius: 7px;
    padding: 0 12px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s;
    white-space: nowrap;
  }
  .btn-export-main:hover { background: #dcdce2; }
  .btn-export-main .chevron { transition: transform .15s; }
  .export-wrap.open .btn-export-main .chevron { transform: rotate(180deg); }
  .export-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 7px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 50;
  }
  .export-wrap.open .export-dropdown { display: block; }
  .export-group-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    padding: 4px 8px 2px;
  }
  .export-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-mid);
    font-size: 12.5px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .1s, color .1s;
    text-align: left;
  }
  .export-item:hover { background: var(--panel-2); color: var(--text); }
  .export-hint {
    font-size: 10.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .export-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ═══ MAIN ═══ */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-width: 0;
  }

  /* Toolbar */
  .toolbar {
    height: 60px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    gap: 10px;
  }
  /* Tous les éléments de la toolbar partagent la même hauteur */
  .dims-badge, .seed-chip, .btn-tool, .btn-randomize {
    height: 30px;
    display: inline-flex;
    align-items: center;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    white-space: nowrap;
    transition: border-color .1s, color .1s;
  }
  .toolbar .spacer { flex: 1; }
  .dims-badge {
    padding: 0 10px;
    font-size: 11.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .seed-chip {
    padding: 0 10px;
    font-size: 10.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", Menlo, monospace;
  }
  .btn-tool {
    padding: 0 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    gap: 5px;
  }
  .btn-tool:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-randomize {
    padding: 0 13px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    gap: 6px;
  }
  .btn-randomize:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* Stage */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    overflow: hidden;
    background: repeating-conic-gradient(#18181d 0% 25%, #141418 0% 50%) 0 0 / 22px 22px;
  }
  #preview {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
    border-radius: 4px;
  }
  #preview svg {
    display: block;
    max-width: 100%;
    max-height: calc(100vh - 118px);
    height: auto;
    border-radius: 4px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    opacity: 0;
    background: var(--accent);
    color: #101014;
    font-size: 12.5px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 8px;
    transition: transform .38s var(--ease-spring), opacity .22s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* ── Entrées animées (menus, sélecteur, scène) ── */
  @keyframes surgir {
    from { opacity: 0; transform: translateY(-6px) scale(.98); }
  }
  .export-wrap.open .export-dropdown { animation: surgir .26s var(--ease-out); transform-origin: top right; }
  .dims-wrap.open .dims-popover { animation: surgir .26s var(--ease-out); transform-origin: top left; }
  .picker:not([hidden]) { animation: surgir .26s var(--ease-out); }
  @keyframes renaitre {
    from { opacity: .45; transform: scale(.993); }
  }
  #preview.renaitre svg { animation: renaitre .34s var(--ease-out); }

  /* Retour tactile : enfoncement au clic */
  button:active:not(:disabled) { transform: scale(.96); }
  input[type="range"]:active { transform: none; }
</style>
</head>

  candy:"Bonbon", ocean:"Océan", sunset:"Couchant", pastel:"Pastel",

/* ── RNG ── */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeNoise(rng, cols, rows, scale) {
  const gw = Math.max(2, Math.ceil(cols / scale) + 1);
  const gh = Math.max(2, Math.ceil(rows / scale) + 1);
  const grid = new Float32Array(gw * gh);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  return function (x, y) {
    const fx = x / scale, fy = y / scale;
    const x0 = Math.floor(fx), y0 = Math.floor(fy);
    const tx = fx - x0, ty = fy - y0;
    const sx = tx*tx*(3-2*tx), sy = ty*ty*(3-2*ty);
    const x1 = Math.min(x0+1,gw-1), y1 = Math.min(y0+1,gh-1);
    const a = grid[y0*gw+x0], b = grid[y0*gw+x1];
    const c = grid[y1*gw+x0], d = grid[y1*gw+x1];
    return a+(b-a)*sx+(c-a)*sy+(a-b-c+d)*sx*sy;
  };
}

function fadeFactor(nx, ny, mode, strength) {
  if (mode === "none" || strength === 0) return 1;
  let f = 1;
  switch (mode) {
    case "edges": { const dx=Math.min(nx,1-nx)*2, dy=Math.min(ny,1-ny)*2; f=Math.min(1,Math.min(dx,dy)*2.2); break; }
    case "center": { const d=Math.hypot(nx-.5,ny-.5)/.707; f=1-d; break; }
    case "top": f=ny; break; case "bottom": f=1-ny; break;
    case "left": f=nx; break; case "right": f=1-nx; break;
  }
  return 1 - strength * (1 - Math.max(0, Math.min(1, f)));
}

function grayTone(rng) {
  const v = 120 + Math.floor(rng() * 90);
  const h = v.toString(16).padStart(2,"0");
  return "#"+h+h+h;
}

function pickColor(rng, t) {
  if (rng() < state.grayMix/100) return grayTone(rng);
  const n = state.colors.length;
  if (t === null || n === 1) return state.colors[Math.floor(rng()*n)];
  const jitter = (rng()-.5)*.3;
  const tt = Math.max(0, Math.min(0.999, t+jitter));
  return state.colors[Math.floor(tt*n)];
}

function colorT(nx, ny, depth) {
  switch (state.colorDist) {
    case "horizontal": return nx;
    case "vertical":   return ny;
    case "radial":     return Math.min(1, Math.hypot(nx-.5,ny-.5)*2);
    case "depth":      return depth!=null ? depth : Math.min(1,Math.hypot(nx-.5,ny-.5)*2);
    default:           return null;
  }
}

/* ── Champs de modulation (ondes, ondulations, tourbillon, topographie) ── */
function makeField(kind) {
  const s = state;
  const phase = mulberry32(s.seed^0x1234abcd)()*Math.PI*2;
  const freq = s.waveFreq;
  if (kind === "wave") {
    return (nx,ny) => {
      let coord;
      switch(s.waveDir) { case "vertical": coord=ny; break; case "diagonal": coord=(nx+ny)/2; break; case "radial": coord=Math.hypot(nx-.5,ny-.5)*2; break; default: coord=nx; }
      return .5+.5*Math.sin(coord*freq*Math.PI*2+phase);
    };
  }
  if (kind === "ripple") {
    // Anneaux concentriques rayonnant du centre, amplitude décroissante
    return (nx,ny) => {
      const dr=Math.hypot(nx-.5,ny-.5);
      const env=Math.max(0,1-dr*1.25);
      return .5+.5*env*Math.sin(dr*freq*Math.PI*4-phase);
    };
  }
  if (kind === "vortex") {
    // Bras spiralés : combinaison angle + rayon
    const arms=Math.max(1,Math.round(freq/2));
    return (nx,ny) => {
      const dx=nx-.5, dy=ny-.5, dr=Math.hypot(dx,dy), ang=Math.atan2(dy,dx);
      return .5+.5*Math.sin(arms*ang + dr*freq*Math.PI*4 - phase);
    };
  }
  if (kind === "topo") {
    // Lignes de niveau d'un champ de bruit lissé
    const cols=Math.ceil(s.width/s.cellSize), rows=Math.ceil(s.height/s.cellSize);
    const scale=Math.max(6, Math.min(cols,rows)/4);
    const noise=makeNoise(mulberry32(s.seed^0x51ed7099), cols, rows, scale);
    const levels=Math.max(2, freq);
    return (nx,ny,gx,gy) => {
      const c=noise(gx,gy)*levels, frac=c-Math.floor(c);
      const line=1-Math.min(frac,1-frac)*2;
      return line*line;
    };
  }
  return null;
}

/* ── Dot generators ── */
function gridDots(rng, maskFn, fieldFn) {
  const s = state, cell = s.cellSize;
  const cols = Math.ceil(s.width/cell), rows = Math.ceil(s.height/cell);
  const noise = makeNoise(mulberry32(s.seed^0x9e3779b9), cols, rows, 6);
  const clusterAmt = s.clustering/100, density = s.density/100;
  const fadeStrength = s.fadeStrength/100, sizeVar = s.sizeVar/100;
  const opacityVar = s.opacityVar/100, baseDot = cell*(s.dotScale/100);
  const amp = s.waveAmp/100;
  const dots = [];
  for (let gy=0; gy<rows; gy++) {
    for (let gx=0; gx<cols; gx++) {
      const r1=rng(), r2=rng();
      const cx=gx*cell+cell/2, cy=gy*cell+cell/2;
      const nx=cx/s.width, ny=cy/s.height;
      let local = density*fadeFactor(nx,ny,s.fadeMode,fadeStrength);
      let sizeFactor = 1;
      if (clusterAmt>0) { const n=noise(gx,gy); local*=(1-clusterAmt)+clusterAmt*(n*n*3); }
      if (maskFn) { const m=maskFn(cx,cy); if(m<=0) continue; local*=m; }
      if (fieldFn) {
        const v=fieldFn(nx,ny,gx,gy);
        sizeFactor=1-amp+amp*v; local*=(1-amp)+amp*v*v*2;
      }
      if (r1>=local) continue;
      dots.push({ x:cx, y:cy, size:baseDot*sizeFactor*(1-sizeVar*rng()), color:pickColor(rng,colorT(nx,ny,null)), opacity:1-opacityVar*r2 });
    }
  }
  return dots;
}

function discMask() {
  const s=state, cx=s.width/2, cy=s.height/2;
  const r=(s.radiusPct/100)*Math.min(s.width,s.height)/2;
  const soft=Math.max(1,(s.softEdge/100)*r);
  return (px,py) => { const d=Math.hypot(px-cx,py-cy); if(d>=r) return 0; if(d<=r-soft) return 1; return (r-d)/soft; };
}

function ringMask() {
  const s=state, cx=s.width/2, cy=s.height/2;
  const r=(s.radiusPct/100)*Math.min(s.width,s.height)/2;
  const bandHalf=Math.max(2,r*(s.ringThickness/200)), ringCenter=r-bandHalf;
  const soft=Math.max(1,(s.softEdge/100)*bandHalf);
  return (px,py) => { const dd=Math.abs(Math.hypot(px-cx,py-cy)-ringCenter); if(dd>=bandHalf) return 0; if(dd<=bandHalf-soft) return 1; return (bandHalf-dd)/soft; };
}

function spiralDots(rng, ghost) {
  const s=state, cx=s.width/2, cy=s.height/2;
  const golden=Math.PI*(3-Math.sqrt(5)), rMax=Math.hypot(s.width,s.height)/2;
  const sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100, decay=s.spiralDecay/100;
  const dots=[];
  for (let i=0; i<s.count; i++) {
    const r=s.spiralSpacing*Math.sqrt(i); if(r>rMax) break;
    const th=i*golden, x=cx+r*Math.cos(th), y=cy+r*Math.sin(th);
    if(x<-20||x>s.width+20||y<-20||y>s.height+20) continue;
    const tr=Math.min(1,r/(Math.min(s.width,s.height)/2));
    const base=s.dotSizePx*Math.max(.05,1-decay*tr);
    if (ghost) { dots.push({ x, y, size:base }); continue; }
    dots.push({ x, y, size:base*(1-sizeVar*rng()), color:pickColor(rng,colorT(x/s.width,y/s.height,tr)), opacity:1-opacityVar*rng() });
  }
  return dots;
}

function sphereDots(rng, ghost) {
  const s=state, cx=s.width/2, cy=s.height/2;
  const R=(s.radiusPct/100)*Math.min(s.width,s.height)/2;
  const rx=(s.rotX*Math.PI)/180, ry=(s.rotY*Math.PI)/180;
  const cosX=Math.cos(rx), sinX=Math.sin(rx), cosY=Math.cos(ry), sinY=Math.sin(ry);
  const f=1.6+(1-s.perspAmount/100)*10, N=Math.max(2,s.count);
  const sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100, backFade=s.backFade/100;
  const golden=Math.PI*(3-Math.sqrt(5)), dots=[];
  for (let i=0; i<N; i++) {
    let py=1-(i/(N-1))*2, rad=Math.sqrt(Math.max(0,1-py*py)), th=golden*i;
    let px=rad*Math.cos(th), pz=rad*Math.sin(th);
    let y1=py*cosX-pz*sinX, z1=py*sinX+pz*cosX;
    let x2=px*cosY+z1*sinY, z2=-px*sinY+z1*cosY;
    const sc=f/(f+z2), sx=cx+x2*R*sc, sy=cy+y1*R*sc;
    const depth=(z2+1)/2, fade=1-backFade*depth;
    if (ghost) { dots.push({ x:sx, y:sy, z:z2, size:s.dotSizePx*sc }); continue; }
    if(fade<=.02) continue;
    dots.push({ x:sx, y:sy, z:z2, size:s.dotSizePx*sc*(1-sizeVar*rng()), color:pickColor(rng,colorT(sx/s.width,sy/s.height,depth)), opacity:(1-opacityVar*rng())*fade });
  }
  dots.sort((a,b)=>b.z-a.z);
  return dots;
}

function perspDots(rng, ghost) {
  const s=state, cx=s.width/2;
  const horizonY=(s.horizon/100)*s.height, span=s.height-horizonY;
  const baseK=s.cellSize/Math.max(1,span-s.cellSize);
  const k=baseK*(0.3+(s.perspStrength/100)*2.5);
  const baseDot=s.cellSize*(s.dotScale/100), density=s.density/100;
  const fadeStrength=s.fadeStrength/100, sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100;
  const dots=[];
  let prevY=s.height+s.cellSize;
  for (let i=1; i<=400; i++) {
    const sc=1/(1+(i-1)*k), y=horizonY+(s.height-horizonY)*sc;
    if(prevY-y<1.2) break; prevY=y;
    const cellW=s.cellSize*sc; if(cellW<1.5) break;
    // Trame fantôme : on s'arrête avant l'horizon (illisible et très coûteux en dessous)
    if(ghost && sc<0.4) break;
    const cols=Math.ceil(s.width/cellW)+2, depth=1-sc;
    for (let c=0; c<cols; c++) {
      if (ghost) {
        const gx=cx+(c-cols/2)*cellW;
        if(gx<-cellW||gx>s.width+cellW) continue;
        dots.push({ x:gx, y, size:baseDot*sc });
        continue;
      }
      const r1=rng(), r2=rng();
      const x=cx+(c-cols/2)*cellW;
      if(x<-cellW||x>s.width+cellW) continue;
      const nx=x/s.width, ny=y/s.height;
      const local=density*fadeFactor(nx,ny,s.fadeMode,fadeStrength);
      if(r1>=local) continue;
      dots.push({ x, y, size:baseDot*sc*(1-sizeVar*rng()), color:pickColor(rng,colorT(nx,ny,depth)), opacity:1-opacityVar*r2 });
    }
  }
  return dots;
}

/* ── Image importée : trame pilotée par la luminosité ── */
let imageEchantillon=null;

function chargerImage(fichier) {
  const url=URL.createObjectURL(fichier);
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement("canvas");
    const max=384, k=Math.min(1, max/Math.max(img.width,img.height));
    c.width=Math.max(1,Math.round(img.width*k));
    c.height=Math.max(1,Math.round(img.height*k));
    const ctx=c.getContext("2d");
    ctx.drawImage(img,0,0,c.width,c.height);
    imageEchantillon={ pixels: ctx.getImageData(0,0,c.width,c.height).data, w: c.width, h: c.height };
    document.getElementById("imageName").textContent=fichier.name;
    URL.revokeObjectURL(url);
    render();
  };
  img.onerror=()=>{ URL.revokeObjectURL(url); showToast("Image illisible"); };
  img.src=url;
}

function luminanceImage(nx, ny) {
  // ajustement « cover » : l'image remplit le canevas, recadrée au centre
  const s=state, im=imageEchantillon;
  const k=Math.max(s.width/im.w, s.height/im.h);
  const px=Math.min(im.w-1, Math.max(0, Math.round((nx*s.width+(im.w*k-s.width)/2)/k)));
  const py=Math.min(im.h-1, Math.max(0, Math.round((ny*s.height+(im.h*k-s.height)/2)/k)));
  const i=(py*im.w+px)*4, d=im.pixels, a=d[i+3]/255;
  const r=d[i]*a+255*(1-a), g=d[i+1]*a+255*(1-a), b=d[i+2]*a+255*(1-a);
  return (0.2126*r+0.7152*g+0.0722*b)/255;
}

function imageDots(rng, ghost) {
  const s=state, cell=s.cellSize;
  const dots=[];
  if(!imageEchantillon) return dots;
  const cols=Math.ceil(s.width/cell), rows=Math.ceil(s.height/cell);
  const density=s.density/100, fadeStrength=s.fadeStrength/100;
  const sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100, baseDot=cell*(s.dotScale/100);
  const contraste=0.5+(s.imgContrast/100)*2;
  for (let gy=0; gy<rows; gy++) {
    for (let gx=0; gx<cols; gx++) {
      const cx=gx*cell+cell/2, cy=gy*cell+cell/2;
      const nx=cx/s.width, ny=cy/s.height;
      if (ghost) { dots.push({ x:cx, y:cy, size:baseDot }); continue; }
      const r1=rng(), r2=rng();
      let lum=luminanceImage(nx,ny);
      if(s.imgInvert) lum=1-lum;
      let sombre=Math.max(0,Math.min(1,(1-lum-0.5)*contraste+0.5));
      const local=density*sombre*fadeFactor(nx,ny,s.fadeMode,fadeStrength)*1.6;
      if(r1>=local) continue;
      dots.push({ x:cx, y:cy, size:baseDot*(0.35+0.65*sombre)*(1-sizeVar*rng()), color:pickColor(rng,colorT(nx,ny,sombre)), opacity:1-opacityVar*r2 });
    }
  }
  return dots;
}

function generateDotList(rng, ghost) {
  switch(state.mode) {
    case "disc":   return gridDots(rng, discMask(), null);
    case "ring":   return gridDots(rng, ringMask(), null);
    case "wave":   return gridDots(rng, null, makeField("wave"));
    case "ripple": return gridDots(rng, null, makeField("ripple"));
    case "vortex": return gridDots(rng, null, makeField("vortex"));
    case "topo":   return gridDots(rng, null, makeField("topo"));
    case "spiral": return spiralDots(rng, ghost);
    case "sphere": return sphereDots(rng, ghost);
    case "persp":  return perspDots(rng, ghost);
    case "image":  return imageDots(rng, ghost);
    default:       return gridDots(rng, null, null);
  }
}

/* ── SVG ── */
function svgDot(d, fill, o) {
  if(state.shape==="circle") return `<circle cx="${d.x.toFixed(1)}" cy="${d.y.toFixed(1)}" r="${(d.size/2).toFixed(2)}" fill="${fill}"${o}/>`;
  const rx=state.shape==="rounded"?` rx="${(d.size*.25).toFixed(2)}"`:``;
  return `<rect x="${(d.x-d.size/2).toFixed(1)}" y="${(d.y-d.size/2).toFixed(1)}" width="${d.size.toFixed(2)}" height="${d.size.toFixed(2)}"${rx} fill="${fill}"${o}/>`;
}
function generateSVG() {
  const s=state, rng=mulberry32(s.seed), parts=[];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${s.width}" height="${s.height}" viewBox="0 0 ${s.width} ${s.height}">`);
  if(!s.bgTransparent) parts.push(`<rect width="${s.width}" height="${s.height}" fill="${s.bgColor}"/>`);
  if(s.showGrid) {
    // La grille subtile épouse la forme des points ET la disposition
    const go=` fill-opacity="${(s.gridOpacity/100).toFixed(3)}"`;
    if(["spiral","sphere","persp"].includes(s.mode)) {
      // Trame fantôme : toutes les positions de la disposition, sans aléa
      // (les points < 1 px sont invisibles à cette opacité : on les saute)
      for (const d of generateDotList(null, true)) {
        if(d.size<1) continue;
        parts.push(svgDot(d, "#808080", go));
      }
    } else {
      // Trame régulière : motif répété à la forme du point
      const cell=s.cellSize, ds=cell*(s.dotScale/100), off=(cell-ds)/2;
      let motif;
      if(s.shape==="circle") motif=`<circle cx="${(cell/2).toFixed(2)}" cy="${(cell/2).toFixed(2)}" r="${(ds/2).toFixed(2)}" fill="#808080"${go}/>`;
      else motif=`<rect x="${off.toFixed(2)}" y="${off.toFixed(2)}" width="${ds.toFixed(2)}" height="${ds.toFixed(2)}"${s.shape==="rounded"?` rx="${(ds*.25).toFixed(2)}"`:""} fill="#808080"${go}/>`;
      parts.push(`<defs><pattern id="sg" width="${cell}" height="${cell}" patternUnits="userSpaceOnUse">${motif}</pattern></defs><rect width="${s.width}" height="${s.height}" fill="url(#sg)"/>`);
    }
  }
  for (const d of generateDotList(rng)) {
    if(d.size<.3||d.opacity<=.01) continue;
    const o=d.opacity<.999?` fill-opacity="${d.opacity.toFixed(2)}"`:"";
    parts.push(svgDot(d, d.color, o));
  }
  parts.push("</svg>"); return parts.join("");
}

/* ── Render ── */
const preview = document.getElementById("preview");
function animerScene() { preview.classList.add("renaitre"); }
preview.addEventListener("animationend", ()=>preview.classList.remove("renaitre"));
let renderQueued = false;
function render() {
  if(renderQueued) return; renderQueued=true;
  setTimeout(() => {
    renderQueued=false;
    preview.innerHTML=generateSVG();
    document.getElementById("dimsLabel").textContent=`${state.width} × ${state.height}`;
    document.getElementById("seedDisplay").textContent="graine "+String(state.seed).padStart(6,"0");
  }, 0);
}

/* ── Exports ── */
function download(blob, fname) {
  const url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download=fname; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}
function fname(ext) { return `dots-${state.mode}-${state.width}x${state.height}-seed${state.seed}.${ext}`; }

/* ── Export dropdown ── */
function exportPng(scale) {
  const svgBlob=new Blob([generateSVG()],{type:"image/svg+xml"});
  const url=URL.createObjectURL(svgBlob), img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    canvas.width=state.width*scale; canvas.height=state.height*scale;
    canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(blob=>download(blob,`dots-${state.mode}-${state.width}x${state.height}-${scale}x-seed${state.seed}.png`),"image/png");
  }; img.src=url;
}
function updateExportHints() {
  [1,2,3,4].forEach(s=>{
    const el=document.getElementById(`hint${s}x`);
    if(el) el.textContent=`${state.width*s}×${state.height*s}`;
  });
}
const exportWrap=document.getElementById("exportWrap");
document.getElementById("exportTrigger").addEventListener("click", e=>{
  e.stopPropagation();
  updateExportHints();
  const ouvert=exportWrap.classList.toggle("open");
  e.currentTarget.setAttribute("aria-expanded", ouvert);
});
document.addEventListener("click", e=>{ if(!exportWrap.contains(e.target)) fermerExport(); });
function fermerExport() {
  exportWrap.classList.remove("open");
  document.getElementById("exportTrigger").setAttribute("aria-expanded","false");
}
document.getElementById("exportDropdown").addEventListener("click", e=>{
  const item=e.target.closest(".export-item"); if(!item) return;
  if(item.dataset.action==="svg") download(new Blob([generateSVG()],{type:"image/svg+xml"}),fname("svg"));
  else exportPng(parseInt(item.dataset.scale,10));
  fermerExport();
});

function showToast(msg) {
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2000);
}

/* ── Slider fill ── */
function updateFill(el) {
  const min=+el.min, max=+el.max, val=+el.value;
  el.style.setProperty("--pct", ((val-min)/(max-min)*100).toFixed(1)+"%");
}

/* ── Liaisons ── */
function bindSlider(id, key) {
  const el=document.getElementById(id), valEl=document.getElementById(id+"Val");
  updateFill(el);
  el.addEventListener("input", ()=>{
    state[key]=parseInt(el.value,10);
    if(valEl) valEl.textContent=el.value;
    updateFill(el); render();
  });
  if(valEl) valEl.textContent=el.value;
}

bindSlider("cellSize","cellSize");
bindSlider("dotScale","dotScale");
bindSlider("dotSizePx","dotSizePx");
bindSlider("sizeVar","sizeVar");
bindSlider("density","density");
bindSlider("clustering","clustering");
bindSlider("fadeStrength","fadeStrength");
bindSlider("grayMix","grayMix");

const optGrids={};
function initDropdown(id, cle) {
  const racine=document.getElementById(id);
  const declencheur=racine.querySelector(".dd-trigger");
  const menu=racine.querySelector(".dd-menu");
  const options=[...menu.querySelectorAll("[data-value]")];
  const affichage=racine.querySelector(".dd-value");
  function appliquer(v, rendre=true) {
    state[cle]=v;
    let texte="";
    options.forEach(o=>{
      const actif=o.dataset.value===v;
      o.classList.toggle("active",actif);
      o.setAttribute("aria-selected",actif?"true":"false");
      if(actif) texte=o.textContent;
    });
    affichage.textContent=texte;
    if(rendre) render();
  }
  function fermer(focus=false) {
    if(menu.hidden) return;
    menu.hidden=true;
    declencheur.setAttribute("aria-expanded","false");
    racine.classList.remove("open");
    document.removeEventListener("pointerdown",horsClic,true);
    window.removeEventListener("scroll",fermerSansFocus,true);
    if(focus) declencheur.focus();
  }
  function fermerSansFocus(){ fermer(false); }
  function horsClic(e){ if(!racine.contains(e.target)) fermer(); }
  function ouvrir() {
    const r=declencheur.getBoundingClientRect();
    menu.style.left=r.left+"px";
    menu.style.width=r.width+"px";
    menu.hidden=false;
    declencheur.setAttribute("aria-expanded","true");
    racine.classList.add("open");
    const mh=menu.offsetHeight;
    menu.style.top=(r.bottom+5+mh>innerHeight-8 ? Math.max(8,r.top-mh-5) : r.bottom+5)+"px";
    (options.find(o=>o.classList.contains("active"))||options[0]).focus();
    setTimeout(()=>{
      document.addEventListener("pointerdown",horsClic,true);
      window.addEventListener("scroll",fermerSansFocus,true);
    },0);
  }
  declencheur.addEventListener("click",()=>{ menu.hidden?ouvrir():fermer(); });
  menu.addEventListener("click",e=>{
    const o=e.target.closest("[data-value]");
    if(o){ appliquer(o.dataset.value); fermer(true); }
  });
  racine.addEventListener("keydown",e=>{
    if(e.key==="Escape"){ e.stopPropagation(); fermer(true); }
    else if((e.key==="ArrowDown"||e.key==="ArrowUp")&&!menu.hidden){
      e.preventDefault();
      const i=options.indexOf(document.activeElement);
      const ni=e.key==="ArrowDown"?Math.min(options.length-1,i+1):Math.max(0,i-1);
      options[ni].focus();
    }
  });
  optGrids[id]=appliquer;
  appliquer(state[cle], false);
}

/* Swatches */
const MAX_COULEURS=8;
function renderSwatches() {
  const wrap=document.getElementById("swatches"), add=document.getElementById("addColor");
  wrap.querySelectorAll(".swatch").forEach(el=>el.remove());
  state.colors.forEach((c,i)=>{
    const sw=document.createElement("div"); sw.className="swatch"; sw.draggable=true;
    sw.title=`${c} — glisser pour réordonner`;
    const btn=document.createElement("button");
    btn.type="button"; btn.className="swatch-color";
    btn.style.background=c;
    btn.setAttribute("aria-label",`Couleur ${i+1} : ${c} — modifier`);
    btn.addEventListener("click",()=>{
      picker.ouvrir(btn, state.colors[i], hx=>{
        state.colors[i]=hx;
        btn.style.background=hx;
        btn.setAttribute("aria-label",`Couleur ${i+1} : ${hx} — modifier`);
        sw.title=`${hx} — glisser pour réordonner`;
        clearPaletteActive(); render();
      });
    });
    sw.appendChild(btn);
    if(state.colors.length>1) {
      const del=document.createElement("button"); del.className="del"; del.type="button"; del.textContent="×";
      del.setAttribute("aria-label",`Supprimer la couleur ${i+1}`);
      del.addEventListener("click",e=>{ e.stopPropagation(); state.colors.splice(i,1); clearPaletteActive(); renderSwatches(); render(); });
      sw.appendChild(del);
    }
    // Réordonnancement par glisser-déposer (l'ordre pilote les répartitions horizontale/radiale…)
    sw.addEventListener("dragstart",e=>{ e.dataTransfer.setData("text/plain",String(i)); e.dataTransfer.effectAllowed="move"; sw.classList.add("dragging"); });
    sw.addEventListener("dragend",()=>sw.classList.remove("dragging"));
    sw.addEventListener("dragover",e=>{ e.preventDefault(); e.dataTransfer.dropEffect="move"; sw.classList.add("drag-over"); });
    sw.addEventListener("dragleave",()=>sw.classList.remove("drag-over"));
    sw.addEventListener("drop",e=>{
      e.preventDefault(); sw.classList.remove("drag-over");
      const de=parseInt(e.dataTransfer.getData("text/plain"),10);
      if(isNaN(de)||de===i) return;
      const [depl]=state.colors.splice(de,1);
      state.colors.splice(i,0,depl);
      clearPaletteActive(); renderSwatches(); render();
    });
    wrap.insertBefore(sw,add);
  });
  const plein=state.colors.length>=MAX_COULEURS;
  add.disabled=plein;
  add.title=plein?`Maximum ${MAX_COULEURS} couleurs`:"Ajouter une couleur";
}
/* ── Sélecteur de couleur maison ── */
function hsvToHex(h,sv,v) {
  const ss=sv/100, vv=v/100;
  const f=n=>{ const k=(n+h/60)%6; const c=vv-vv*ss*Math.max(0,Math.min(k,4-k,1)); return Math.round(c*255).toString(16).padStart(2,"0"); };
  return "#"+f(5)+f(3)+f(1);
}
function hexToHsv(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), d=mx-mn;
  let h=0;
  if(d){ if(mx===r) h=60*(((g-b)/d)%6); else if(mx===g) h=60*((b-r)/d+2); else h=60*((r-g)/d+4); }
  return [(h+360)%360, mx?d/mx*100:0, mx*100];
}
const picker=(()=>{
  const el=document.getElementById("colorPicker"), sv=document.getElementById("pickerSV");
  const hueEl=document.getElementById("pickerHue"), hexEl=document.getElementById("pickerHex");
  const chip=document.getElementById("pickerChip"), curseur=document.getElementById("pickerCursor");
  const pipette=document.getElementById("pickerEyedrop");
  let h=120, sat=80, val=80, cb=null, retour=null;
  function maj(notifier=true) {
    el.style.setProperty("--hue", h);
    sv.style.setProperty("--hue", h);
    hueEl.style.setProperty("--hue", h);
    curseur.style.left=sat+"%"; curseur.style.top=(100-val)+"%";
    curseur.style.background=hsvToHex(h,sat,val);
    const hx=hsvToHex(h,sat,val);
    chip.style.background=hx;
    if(document.activeElement!==hexEl) hexEl.value=hx;
    hueEl.value=Math.round(h);
    sv.setAttribute("aria-valuetext",`saturation ${Math.round(sat)} %, luminosité ${Math.round(val)} %`);
    if(notifier&&cb) cb(hx);
  }
  function depuisHex(hx, notifier=true) {
    const [hh,ss,vv]=hexToHsv(hx); h=hh; sat=ss; val=vv; maj(notifier);
  }
  function pointeur(e) {
    const r=sv.getBoundingClientRect();
    sat=Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100));
    val=Math.max(0,Math.min(100,100-(e.clientY-r.top)/r.height*100));
    maj();
  }
  sv.addEventListener("pointerdown",e=>{
    e.preventDefault(); sv.setPointerCapture(e.pointerId); pointeur(e);
    const mv=ev=>pointeur(ev);
    sv.addEventListener("pointermove",mv);
    sv.addEventListener("pointerup",()=>sv.removeEventListener("pointermove",mv),{once:true});
  });
  sv.addEventListener("keydown",e=>{
    const pas=e.shiftKey?10:2; let pris=true;
    switch(e.key){
      case "ArrowLeft": sat=Math.max(0,sat-pas); break;
      case "ArrowRight": sat=Math.min(100,sat+pas); break;
      case "ArrowUp": val=Math.min(100,val+pas); break;
      case "ArrowDown": val=Math.max(0,val-pas); break;
      default: pris=false;
    }
    if(pris){ e.preventDefault(); maj(); }
  });
  hueEl.addEventListener("input",()=>{ h=+hueEl.value; maj(); });
  hexEl.addEventListener("change",()=>{
    let v=hexEl.value.trim(); if(!v.startsWith("#")) v="#"+v;
    if(/^#[0-9a-f]{6}$/i.test(v)) depuisHex(v.toLowerCase());
    else hexEl.value=hsvToHex(h,sat,val);
  });
  if(window.EyeDropper){
    pipette.hidden=false;
    pipette.addEventListener("click",async()=>{
      try { const res=await new EyeDropper().open(); depuisHex(res.sRGBHex.toLowerCase()); } catch {}
    });
  }
  function fermer() {
    if(el.hidden) return;
    el.hidden=true; cb=null;
    document.removeEventListener("pointerdown",horsClic,true);
    window.removeEventListener("scroll",fermer,true);
    if(retour){ retour.focus(); retour=null; }
  }
  function horsClic(e) { if(!el.contains(e.target)&&e.target!==retour) fermer(); }
  el.addEventListener("keydown",e=>{ if(e.key==="Escape"){ e.stopPropagation(); fermer(); } });
  function ouvrir(ancre, couleur, onChange) {
    cb=null; retour=ancre;
    depuisHex(couleur, false);
    cb=onChange;
    el.hidden=false;
    const r=ancre.getBoundingClientRect(), pw=el.offsetWidth, ph=el.offsetHeight;
    let x=r.left, y=r.bottom+8;
    if(y+ph>innerHeight-8) y=Math.max(8, r.top-ph-8);
    if(x+pw>innerWidth-8) x=innerWidth-pw-8;
    el.style.left=x+"px"; el.style.top=y+"px";
    setTimeout(()=>{
      document.addEventListener("pointerdown",horsClic,true);
      window.addEventListener("scroll",fermer,true);
    },0);
    sv.focus();
  }
  return { ouvrir, fermer };
})();

function hexToHsl(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b), l=(mx+mn)/2, d=mx-mn;
  let h=0; const sat=d===0?0:d/(1-Math.abs(2*l-1));
  if(d!==0){ if(mx===r) h=60*(((g-b)/d)%6); else if(mx===g) h=60*((b-r)/d+2); else h=60*((r-g)/d+4); }
  return [(h+360)%360, sat*100, l*100];
}
document.getElementById("addColor").addEventListener("click",()=>{
  if(state.colors.length>=MAX_COULEURS) return;
  clearPaletteActive();
  // Couleur dérivée de la dernière : teinte voisine, saturation et clarté proches → harmonie préservée
  const [h,sat,l]=hexToHsl(state.colors[state.colors.length-1]||"#7ed321");
  const nh=(h+(Math.random()*60-30)+360)%360;
  const ns=Math.max(25,Math.min(90,sat+(Math.random()*20-10)));
  const nl=Math.max(25,Math.min(75,l+(Math.random()*24-12)));
  state.colors.push(hslToHex(nh,ns,nl));
  renderSwatches(); render();
});

/* ── Randomiser tout ── */
function hslToHex(h,s,l) {
  s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>{ const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return Math.round(255*c).toString(16).padStart(2,"0"); };
  return "#"+f(0)+f(8)+f(4);
}
function randomPalette() {
  if(Math.random()<.35) { const keys=Object.keys(PALETTES); return [...PALETTES[keys[Math.floor(Math.random()*keys.length)]]]; }
  // Rampe tonale : même famille de teinte, clarté décroissante → palette harmonieuse avec de la profondeur
  const h0=Math.random()*360, derive=(Math.random()-.5)*50, sat=50+Math.random()*35;
  const palette=[];
  for(let i=0;i<5;i++) {
    const t=i/4, h=(h0+derive*t+360)%360;
    const l=68-t*38+(Math.random()-.5)*6;
    palette.push(hslToHex(h, Math.min(95,Math.max(30,sat+(Math.random()-.5)*10)), l));
  }
  return palette;
}

function applyModePreset(mode) {

/* ── Animation accordéon ── */
document.querySelectorAll("details.group").forEach(d=>{
  const body=d.querySelector(".group-body");
  const anim=document.createElement("div");
  anim.className="group-anim";
  body.parentNode.insertBefore(anim,body);
  anim.appendChild(body);
  const summary=d.querySelector("summary");
  let busy=false;
  summary.addEventListener("click",e=>{
    e.preventDefault();
    if(busy) return;
    busy=true;
    if(d.open){
      // Fermeture : on part de 1fr → 0fr
      anim.classList.add("collapsing");
      const done=ev=>{
        if(ev.propertyName!=="grid-template-rows") return;
        anim.removeEventListener("transitionend",done);
        d.open=false;
        anim.classList.remove("collapsing");
        busy=false;
      };
      anim.addEventListener("transitionend",done);
    } else {
      // Ouverture : on rend le contenu, puis 0fr → 1fr
      anim.classList.add("collapsing");
      d.open=true;
      requestAnimationFrame(()=>requestAnimationFrame(()=>anim.classList.remove("collapsing")));
      const done=ev=>{
        if(ev.propertyName!=="grid-template-rows") return;
        anim.removeEventListener("transitionend",done);
        busy=false;
      };
      anim.addEventListener("transitionend",done);
    }
  });
});

document.querySelectorAll("#modeGrid button, #shapeSeg button").forEach(b=>b.setAttribute("aria-pressed", b.classList.contains("active") ? "true" : "false"));

  const boutonsSeg=[...document.querySelectorAll("#shapeSeg button")];
