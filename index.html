<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dots Generator</title>
<style>
  :root {
    --bg: #0e0e12;
    --panel: #16161b;
    --panel-2: #1d1d24;
    --panel-3: #23232c;
    --border: #28282f;
    --border-hover: #3a3a46;
    --text: #e8e8ed;
    --text-dim: #72728a;
    --text-mid: #a8a8bb;
    --accent: #8ce03c;
    --accent-dim: #6fb52f;
    --accent-glow: rgba(140,224,60,.12);
    --slider-fill: #2d2d37;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    font-size: 13px;
  }
  .hidden { display: none !important; }

  /* ═══ SIDEBAR ═══ */
  aside {
    width: 280px;
    min-width: 280px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* Header */
  .sidebar-header {
    height: 60px;
    flex-shrink: 0;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-mark {
    width: 28px; height: 28px; flex-shrink: 0;
    display: grid;
    grid-template-columns: repeat(3,1fr);
    gap: 3px;
  }
  .logo-mark i {
    background: var(--accent);
    border-radius: 2px;
  }
  .logo-mark i:nth-child(2) { opacity:.3; }
  .logo-mark i:nth-child(4) { opacity:.55; }
  .logo-mark i:nth-child(6) { opacity:.15; }
  .logo-mark i:nth-child(8) { opacity:.7; }
  .logo-text h1 { font-size: 13.5px; font-weight: 700; letter-spacing: -.01em; }
  .logo-text p { font-size: 10.5px; color: var(--text-dim); margin-top: 1px; }

  /* Scroll area */
  .controls {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0 16px;
  }
  .controls::-webkit-scrollbar { width: 5px; }
  .controls::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .controls::-webkit-scrollbar-track { background: transparent; }

  /* ── Section groups ── */
  details.group {
    border-bottom: 1px solid var(--border);
  }
  details.group summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 18px;
    user-select: none;
    color: var(--text-mid);
    font-size: 11.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .065em;
    transition: color .12s;
  }
  details.group summary::-webkit-details-marker { display: none; }
  details.group[open] > summary { color: var(--text); }
  details.group summary .s-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--border-hover);
    flex-shrink: 0;
    transition: background .15s;
  }
  details.group[open] > summary .s-dot { background: var(--accent); }
  details.group summary .s-arrow {
    margin-left: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 6px;
    color: var(--text-mid);
    font-size: 12px;
    line-height: 1;
    background: var(--panel-3);
    border: 1px solid var(--border);
    transition: transform .28s cubic-bezier(.4,0,.2,1), color .15s, background .15s, border-color .15s;
  }
  details.group:not([open]) summary .s-arrow { transform: rotate(-90deg); }
  details.group[open] > summary .s-arrow { color: var(--accent); border-color: var(--accent-dim); }
  details.group summary:hover .s-arrow { color: var(--text); background: var(--border); border-color: var(--border-hover); }
  details.group summary:hover { color: var(--text); }

  /* group-body : colonne unique */
  .group-body {
    padding: 6px 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  /* Animation accordéon (pilotée en JS) */
  details.group .group-anim {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows .28s cubic-bezier(.4,0,.2,1);
  }
  details.group .group-anim.collapsing { grid-template-rows: 0fr; }
  details.group .group-anim > .group-body {
    overflow: hidden;
    min-height: 0;
    transition: opacity .22s ease;
  }
  details.group .group-anim.collapsing > .group-body { opacity: 0; }

  /* ── Row : pilule slider — label à l'intérieur, valeur absolue à droite ── */
  .row {
    position: relative;
    height: 34px;
  }
  .row label {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-mid);
    pointer-events: none;
    z-index: 1;
    white-space: nowrap;
  }
  .row label::before {
    content: "";
    width: 3px; height: 3px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .row .val {
    position: absolute;
    right: 11px; top: 50%;
    transform: translateY(-50%);
    font-size: 11.5px;
    color: var(--text-mid);
    font-variant-numeric: tabular-nums;
    pointer-events: none;
    z-index: 1;
  }

  /* items avec label en haut, contrôle en dessous */
  .row-wide {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .row-wide > label:first-child {
    font-size: 10.5px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .row-wide select { width: 100%; }

  /* ── Sliders : la piste occupe toute la pilule ── */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    cursor: ew-resize;
    border-radius: 8px;
    background: linear-gradient(to right, var(--slider-fill) 0% var(--pct,50%), var(--panel-2) var(--pct,50%) 100%);
  }
  .row input[type="range"] {
    position: absolute;
    inset: 0;
    height: 100%;
    margin: 0;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 3px; height: 16px;
    border-radius: 2px;
    border: none;
    background: var(--text-dim);
    opacity: 0;
    transition: opacity .12s;
  }
  input[type="range"]::-moz-range-thumb {
    width: 3px; height: 16px;
    border-radius: 2px;
    border: none;
    background: var(--text-dim);
    opacity: 0;
    transition: opacity .12s;
  }
  input[type="range"]::-moz-range-track { background: transparent; }
  .row:hover input[type="range"]::-webkit-slider-thumb,
  input[type="range"]:focus-visible::-webkit-slider-thumb { opacity: 1; }
  .row:hover input[type="range"]::-moz-range-thumb,
  input[type="range"]:focus-visible::-moz-range-thumb { opacity: 1; }

  /* ── Accessibilité : focus visible + mouvement réduit ── */
  :focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  input[type="range"]:focus-visible { outline-offset: 0; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      transition-duration: .01ms !important;
      animation-duration: .01ms !important;
    }
  }

  /* ── Dims dropdown ── */
  .dims-wrap {
    position: relative;
  }
  .dims-badge {
    font-size: 11.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    background: var(--panel-2);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color .12s, color .12s;
    white-space: nowrap;
  }
  .dims-badge:hover, .dims-wrap.open .dims-badge {
    border-color: var(--border-hover);
    color: var(--text);
  }
  .dims-popover {
    display: none;
    position: absolute;
    top: calc(100% + 7px);
    left: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 50;
  }
  .dims-wrap.open .dims-popover { display: block; }
  .dims-popover-title {
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  /* ── Selects ── */
  select {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 6px 8px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    width: 100%;
    flex: 1;
  }
  select:focus { border-color: var(--accent-dim); }

  /* ── Inputs number ── */
  .dim-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 6px 0 10px;
  }
  .dim-row input[type="number"] {
    flex: 1;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 7px 9px;
    font-size: 12.5px;
    outline: none;
    text-align: center;
  }
  .dim-row input:focus { border-color: var(--accent-dim); }
  .dim-sep { color: var(--text-dim); font-size: 12px; }

  /* ── Segmented control ── */
  .seg {
    display: flex;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    flex: 1;
  }
  .seg button {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11.5px;
    padding: 7px 4px;
    cursor: pointer;
    transition: all .1s;
    font-weight: 500;
  }
  .seg button.active {
    background: var(--accent);
    color: #0a1200;
    font-weight: 700;
  }
  .seg button:not(.active):hover { color: var(--text); }

  /* ── Mode grid ── */
  .mode-grid {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 5px;
    margin: 2px 0 8px;
  }
  .mode-grid button {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 9px;
    padding: 9px 2px 7px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    font-size: 9.5px;
    font-weight: 500;
    transition: all .12s;
    line-height: 1;
  }
  .mode-grid button svg { width: 22px; height: 22px; }
  .mode-grid button svg * { fill: var(--text-dim); transition: fill .12s; }
  .mode-grid button.active {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-glow);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .mode-grid button.active svg * { fill: var(--accent); }
  .mode-grid button:not(.active):hover { border-color: var(--border-hover); color: var(--text-mid); }
  .mode-grid button:not(.active):hover svg * { fill: var(--text-mid); }

  /* ── Mode params card ── */
  #modeParamsCard {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 4px 10px 8px;
    margin: 2px 0 4px;
  }
  /* mode params card hérite du même layout 2 colonnes */

  /* ── Presets pills ── */
  .presets {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin: 8px 0 2px;
  }
  .presets button {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 20px;
    cursor: pointer;
    transition: all .1s;
    font-weight: 500;
  }
  .presets button:hover { border-color: var(--accent-dim); color: var(--text); }

  /* Size presets: 2 cols grid */
  .size-presets {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin: 8px 0 2px;
  }
  .size-presets button {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 5px 8px;
    border-radius: 7px;
    cursor: pointer;
    transition: all .1s;
    text-align: left;
  }
  .size-presets button:hover { border-color: var(--accent-dim); color: var(--text); }
  .size-presets button .size-dims {
    font-size: 9.5px;
    color: var(--text-dim);
    display: block;
    margin-top: 1px;
  }

  /* ── Color swatches ── */
  .swatches {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin: 8px 0 6px;
  }
  .swatch {
    position: relative;
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
    transition: transform .1s;
  }
  .swatch:hover { transform: scale(1.08); }
  .swatch input[type="color"] {
    position: absolute; inset: -5px;
    width: 40px; height: 40px;
    border: none; padding: 0; cursor: pointer;
  }
  .swatch .del {
    position: absolute;
    top: 0; right: 0;
    width: 13px; height: 13px;
    background: rgba(0,0,0,.7);
    color: #fff;
    font-size: 9px;
    line-height: 13px;
    text-align: center;
    border: none;
    border-radius: 0 0 0 5px;
    opacity: 0;
    z-index: 2;
    cursor: pointer;
  }
  .swatch:hover .del, .swatch .del:focus-visible { opacity: 1; }
  .swatch-add {
    width: 30px; height: 30px;
    border-radius: 7px;
    border: 1.5px dashed var(--border);
    background: none;
    color: var(--text-dim);
    font-size: 16px;
    cursor: pointer;
    transition: all .1s;
    line-height: 28px;
  }
  .swatch-add:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* ── Mini color picker (fond) ── */
  .mini-swatch {
    width: 30px; height: 24px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }
  .mini-swatch input[type="color"] {
    position: absolute; inset: -4px;
    width: 38px; height: 32px;
    border: none; padding: 0; cursor: pointer;
  }

  /* ── Toggle switch ── */
  .toggle {
    display: inline-flex;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle input[type="checkbox"] {
    position: absolute; opacity: 0; width: 0; height: 0;
  }
  .toggle-track {
    width: 30px; height: 17px;
    background: var(--panel-3);
    border: 1px solid var(--border);
    border-radius: 9px;
    position: relative;
    transition: background .15s, border-color .15s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 11px; height: 11px;
    background: var(--text-dim);
    border-radius: 50%;
    top: 2px; left: 2px;
    transition: transform .15s, background .15s;
  }
  .toggle input:checked ~ .toggle-track { background: var(--accent); border-color: var(--accent); }
  .toggle input:checked ~ .toggle-track::after { transform: translateX(13px); background: #0a1200; }

  /* ── Export footer ── */
  .sidebar-footer {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
    background: var(--panel);
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .export-primary {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .scale-select {
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 7px;
    padding: 8px 6px;
    font-size: 12px;
    outline: none;
    cursor: pointer;
    width: 52px;
    text-align: center;
  }
  .btn-export-png {
    height: 30px;
    background: var(--accent);
    color: #0a1200;
    border: none;
    border-radius: 7px;
    padding: 0 14px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s;
    white-space: nowrap;
  }
  .btn-export-png:hover { background: #a4f04a; }
  .export-secondary { display: flex; gap: 6px; }
  .btn-ghost {
    flex: 1;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-mid);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    transition: all .12s;
  }
  .btn-ghost:hover { border-color: var(--accent-dim); color: var(--text); }

  /* Sidebar footer : seed + randomize */
  .btn-randomize-full {
    width: 100%;
    background: var(--accent);
    color: #0a1200;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background .12s;
  }
  .btn-randomize-full:hover { background: #a4f04a; }
  .btn-reseed-full {
    width: 100%;
    background: var(--panel-3);
    border: 1px solid var(--border);
    color: var(--text-mid);
    border-radius: 8px;
    padding: 9px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .12s;
  }
  .btn-reseed-full:hover { border-color: var(--border-hover); color: var(--text); }

  /* ── Export dropdown ── */
  .export-wrap {
    position: relative;
  }
  .btn-export-main {
    height: 30px;
    background: var(--accent);
    color: #0a1200;
    border: none;
    border-radius: 7px;
    padding: 0 12px;
    font-size: 12.5px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .12s;
    white-space: nowrap;
  }
  .btn-export-main:hover { background: #a4f04a; }
  .btn-export-main .chevron { transition: transform .15s; }
  .export-wrap.open .btn-export-main .chevron { transform: rotate(180deg); }
  .export-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 7px);
    right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 6px;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    z-index: 50;
  }
  .export-wrap.open .export-dropdown { display: block; }
  .export-group-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--text-dim);
    padding: 4px 8px 2px;
  }
  .export-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: none;
    border: none;
    color: var(--text-mid);
    font-size: 12.5px;
    padding: 7px 8px;
    border-radius: 6px;
    cursor: pointer;
    transition: background .1s, color .1s;
    text-align: left;
  }
  .export-item:hover { background: var(--panel-2); color: var(--text); }
  .export-hint {
    font-size: 10.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .export-divider {
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  /* ═══ MAIN ═══ */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    min-width: 0;
  }

  /* Toolbar */
  .toolbar {
    height: 60px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    padding: 0 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    gap: 10px;
  }
  /* Tous les éléments de la toolbar partagent la même hauteur */
  .dims-badge, .seed-chip, .btn-tool, .btn-randomize {
    height: 30px;
    display: inline-flex;
    align-items: center;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--panel-2);
    white-space: nowrap;
    transition: border-color .1s, color .1s;
  }
  .toolbar .spacer { flex: 1; }
  .dims-badge {
    padding: 0 10px;
    font-size: 11.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }
  .seed-chip {
    padding: 0 10px;
    font-size: 10.5px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
    font-family: "SF Mono", Menlo, monospace;
  }
  .btn-tool {
    padding: 0 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-mid);
    cursor: pointer;
    gap: 5px;
  }
  .btn-tool:hover { border-color: var(--border-hover); color: var(--text); }
  .btn-randomize {
    padding: 0 13px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    gap: 6px;
  }
  .btn-randomize:hover { border-color: var(--accent-dim); color: var(--accent); }

  /* Stage */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    overflow: hidden;

  bgColor: "#f4f5f4", bgTransparent: false, showGrid: true, gridOpacity: 6,

const PALETTES = {

/* ── RNG ── */
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function makeNoise(rng, cols, rows, scale) {
  const gw = Math.max(2, Math.ceil(cols / scale) + 1);
  const gh = Math.max(2, Math.ceil(rows / scale) + 1);
  const grid = new Float32Array(gw * gh);
  for (let i = 0; i < grid.length; i++) grid[i] = rng();
  return function (x, y) {
    const fx = x / scale, fy = y / scale;
    const x0 = Math.floor(fx), y0 = Math.floor(fy);
    const tx = fx - x0, ty = fy - y0;
    const sx = tx*tx*(3-2*tx), sy = ty*ty*(3-2*ty);
    const x1 = Math.min(x0+1,gw-1), y1 = Math.min(y0+1,gh-1);
    const a = grid[y0*gw+x0], b = grid[y0*gw+x1];
    const c = grid[y1*gw+x0], d = grid[y1*gw+x1];
    return a+(b-a)*sx+(c-a)*sy+(a-b-c+d)*sx*sy;
  };
}

function fadeFactor(nx, ny, mode, strength) {
  if (mode === "none" || strength === 0) return 1;
  let f = 1;
  switch (mode) {
    case "edges": { const dx=Math.min(nx,1-nx)*2, dy=Math.min(ny,1-ny)*2; f=Math.min(1,Math.min(dx,dy)*2.2); break; }
    case "center": { const d=Math.hypot(nx-.5,ny-.5)/.707; f=1-d; break; }
    case "top": f=ny; break; case "bottom": f=1-ny; break;
    case "left": f=nx; break; case "right": f=1-nx; break;
  }
  return 1 - strength * (1 - Math.max(0, Math.min(1, f)));
}

function grayTone(rng) {
  const v = 120 + Math.floor(rng() * 90);
  const h = v.toString(16).padStart(2,"0");
  return "#"+h+h+h;
}

function pickColor(rng, t) {
  if (rng() < state.grayMix/100) return grayTone(rng);
  const n = state.colors.length;
  if (t === null || n === 1) return state.colors[Math.floor(rng()*n)];
  const jitter = (rng()-.5)*.3;
  const tt = Math.max(0, Math.min(0.999, t+jitter));
  return state.colors[Math.floor(tt*n)];
}

function colorT(nx, ny, depth) {
  switch (state.colorDist) {
    case "horizontal": return nx;
    case "vertical":   return ny;
    case "radial":     return Math.min(1, Math.hypot(nx-.5,ny-.5)*2);
    case "depth":      return depth!=null ? depth : Math.min(1,Math.hypot(nx-.5,ny-.5)*2);
    default:           return null;
  }
}

/* ── Champs de modulation (ondes, ondulations, tourbillon, topographie) ── */
function makeField(kind) {
  const s = state;
  const phase = mulberry32(s.seed^0x1234abcd)()*Math.PI*2;
  const freq = s.waveFreq;
  if (kind === "wave") {
    return (nx,ny) => {
      let coord;
      switch(s.waveDir) { case "vertical": coord=ny; break; case "diagonal": coord=(nx+ny)/2; break; case "radial": coord=Math.hypot(nx-.5,ny-.5)*2; break; default: coord=nx; }
      return .5+.5*Math.sin(coord*freq*Math.PI*2+phase);
    };
  }
  if (kind === "ripple") {
    // Anneaux concentriques rayonnant du centre, amplitude décroissante
    return (nx,ny) => {
      const dr=Math.hypot(nx-.5,ny-.5);
      const env=Math.max(0,1-dr*1.25);
      return .5+.5*env*Math.sin(dr*freq*Math.PI*4-phase);
    };
  }
  if (kind === "vortex") {
    // Bras spiralés : combinaison angle + rayon
    const arms=Math.max(1,Math.round(freq/2));
    return (nx,ny) => {
      const dx=nx-.5, dy=ny-.5, dr=Math.hypot(dx,dy), ang=Math.atan2(dy,dx);
      return .5+.5*Math.sin(arms*ang + dr*freq*Math.PI*4 - phase);
    };
  }
  if (kind === "topo") {
    // Lignes de niveau d'un champ de bruit lissé
    const cols=Math.ceil(s.width/s.cellSize), rows=Math.ceil(s.height/s.cellSize);
    const scale=Math.max(6, Math.min(cols,rows)/4);
    const noise=makeNoise(mulberry32(s.seed^0x51ed7099), cols, rows, scale);
    const levels=Math.max(2, freq);
    return (nx,ny,gx,gy) => {
      const c=noise(gx,gy)*levels, frac=c-Math.floor(c);
      const line=1-Math.min(frac,1-frac)*2;
      return line*line;
    };
  }
  return null;
}

/* ── Dot generators ── */
function gridDots(rng, maskFn, fieldFn) {
  const s = state, cell = s.cellSize;
  const cols = Math.ceil(s.width/cell), rows = Math.ceil(s.height/cell);
  const noise = makeNoise(mulberry32(s.seed^0x9e3779b9), cols, rows, 6);
  const clusterAmt = s.clustering/100, density = s.density/100;
  const fadeStrength = s.fadeStrength/100, sizeVar = s.sizeVar/100;
  const opacityVar = s.opacityVar/100, baseDot = cell*(s.dotScale/100);
  const amp = s.waveAmp/100;
  const dots = [];
  for (let gy=0; gy<rows; gy++) {
    for (let gx=0; gx<cols; gx++) {
      const r1=rng(), r2=rng();
      const cx=gx*cell+cell/2, cy=gy*cell+cell/2;
      const nx=cx/s.width, ny=cy/s.height;
      let local = density*fadeFactor(nx,ny,s.fadeMode,fadeStrength);
      let sizeFactor = 1;
      if (clusterAmt>0) { const n=noise(gx,gy); local*=(1-clusterAmt)+clusterAmt*(n*n*3); }
      if (maskFn) { const m=maskFn(cx,cy); if(m<=0) continue; local*=m; }
      if (fieldFn) {
        const v=fieldFn(nx,ny,gx,gy);
        sizeFactor=1-amp+amp*v; local*=(1-amp)+amp*v*v*2;
      }
      if (r1>=local) continue;
      dots.push({ x:cx, y:cy, size:baseDot*sizeFactor*(1-sizeVar*rng()), color:pickColor(rng,colorT(nx,ny,null)), opacity:1-opacityVar*r2 });
    }
  }
  return dots;
}

function discMask() {
  const s=state, cx=s.width/2, cy=s.height/2;
  const r=(s.radiusPct/100)*Math.min(s.width,s.height)/2;
  const soft=Math.max(1,(s.softEdge/100)*r);
  return (px,py) => { const d=Math.hypot(px-cx,py-cy); if(d>=r) return 0; if(d<=r-soft) return 1; return (r-d)/soft; };
}

function ringMask() {
  const s=state, cx=s.width/2, cy=s.height/2;
  const r=(s.radiusPct/100)*Math.min(s.width,s.height)/2;
  const bandHalf=Math.max(2,r*(s.ringThickness/200)), ringCenter=r-bandHalf;
  const soft=Math.max(1,(s.softEdge/100)*bandHalf);
  return (px,py) => { const dd=Math.abs(Math.hypot(px-cx,py-cy)-ringCenter); if(dd>=bandHalf) return 0; if(dd<=bandHalf-soft) return 1; return (bandHalf-dd)/soft; };
}

function spiralDots(rng) {
  const s=state, cx=s.width/2, cy=s.height/2;
  const golden=Math.PI*(3-Math.sqrt(5)), rMax=Math.hypot(s.width,s.height)/2;
  const sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100, decay=s.spiralDecay/100;
  const dots=[];
  for (let i=0; i<s.count; i++) {
    const r=s.spiralSpacing*Math.sqrt(i); if(r>rMax) break;
    const th=i*golden, x=cx+r*Math.cos(th), y=cy+r*Math.sin(th);
    if(x<-20||x>s.width+20||y<-20||y>s.height+20) continue;
    const tr=Math.min(1,r/(Math.min(s.width,s.height)/2));
    dots.push({ x, y, size:s.dotSizePx*Math.max(.05,1-decay*tr)*(1-sizeVar*rng()), color:pickColor(rng,colorT(x/s.width,y/s.height,tr)), opacity:1-opacityVar*rng() });
  }
  return dots;
}

function sphereDots(rng) {
  const s=state, cx=s.width/2, cy=s.height/2;
  const R=(s.radiusPct/100)*Math.min(s.width,s.height)/2;
  const rx=(s.rotX*Math.PI)/180, ry=(s.rotY*Math.PI)/180;
  const cosX=Math.cos(rx), sinX=Math.sin(rx), cosY=Math.cos(ry), sinY=Math.sin(ry);
  const f=1.6+(1-s.perspAmount/100)*10, N=Math.max(2,s.count);
  const sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100, backFade=s.backFade/100;
  const golden=Math.PI*(3-Math.sqrt(5)), dots=[];
  for (let i=0; i<N; i++) {
    let py=1-(i/(N-1))*2, rad=Math.sqrt(Math.max(0,1-py*py)), th=golden*i;
    let px=rad*Math.cos(th), pz=rad*Math.sin(th);
    let y1=py*cosX-pz*sinX, z1=py*sinX+pz*cosX;
    let x2=px*cosY+z1*sinY, z2=-px*sinY+z1*cosY;
    const sc=f/(f+z2), sx=cx+x2*R*sc, sy=cy+y1*R*sc;
    const depth=(z2+1)/2, fade=1-backFade*depth;
    if(fade<=.02) continue;
    dots.push({ x:sx, y:sy, z:z2, size:s.dotSizePx*sc*(1-sizeVar*rng()), color:pickColor(rng,colorT(sx/s.width,sy/s.height,depth)), opacity:(1-opacityVar*rng())*fade });
  }
  dots.sort((a,b)=>b.z-a.z);
  return dots;
}

function perspDots(rng) {
  const s=state, cx=s.width/2;
  const horizonY=(s.horizon/100)*s.height, span=s.height-horizonY;
  const baseK=s.cellSize/Math.max(1,span-s.cellSize);
  const k=baseK*(0.3+(s.perspStrength/100)*2.5);
  const baseDot=s.cellSize*(s.dotScale/100), density=s.density/100;
  const fadeStrength=s.fadeStrength/100, sizeVar=s.sizeVar/100, opacityVar=s.opacityVar/100;
  const dots=[];
  let prevY=s.height+s.cellSize;
  for (let i=1; i<=400; i++) {
    const sc=1/(1+(i-1)*k), y=horizonY+(s.height-horizonY)*sc;
    if(prevY-y<1.2) break; prevY=y;
    const cellW=s.cellSize*sc; if(cellW<1.5) break;
    const cols=Math.ceil(s.width/cellW)+2, depth=1-sc;
    for (let c=0; c<cols; c++) {
      const r1=rng(), r2=rng();
      const x=cx+(c-cols/2)*cellW;
      if(x<-cellW||x>s.width+cellW) continue;
      const nx=x/s.width, ny=y/s.height;
      const local=density*fadeFactor(nx,ny,s.fadeMode,fadeStrength);
      if(r1>=local) continue;
      dots.push({ x, y, size:baseDot*sc*(1-sizeVar*rng()), color:pickColor(rng,colorT(nx,ny,depth)), opacity:1-opacityVar*r2 });
    }
  }
  return dots;
}

function generateDotList(rng) {
  switch(state.mode) {
    case "disc":   return gridDots(rng, discMask(), null);
    case "ring":   return gridDots(rng, ringMask(), null);
    case "wave":   return gridDots(rng, null, makeField("wave"));
    case "ripple": return gridDots(rng, null, makeField("ripple"));
    case "vortex": return gridDots(rng, null, makeField("vortex"));
    case "topo":   return gridDots(rng, null, makeField("topo"));
    case "spiral": return spiralDots(rng);
    case "sphere": return sphereDots(rng);
    case "persp":  return perspDots(rng);
    default:       return gridDots(rng, null, null);
  }
}

/* ── SVG ── */
function generateSVG() {
  const s=state, rng=mulberry32(s.seed), parts=[];
  parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${s.width}" height="${s.height}" viewBox="0 0 ${s.width} ${s.height}">`);
  if(!s.bgTransparent) parts.push(`<rect width="${s.width}" height="${s.height}" fill="${s.bgColor}"/>`);
  if(s.showGrid) {
    const cell=s.cellSize, gs=(cell*(s.dotScale/100)).toFixed(2), off=((cell-cell*(s.dotScale/100))/2).toFixed(2);
    parts.push(`<defs><pattern id="sg" width="${cell}" height="${cell}" patternUnits="userSpaceOnUse"><rect x="${off}" y="${off}" width="${gs}" height="${gs}" fill="#808080" fill-opacity="${(s.gridOpacity/100).toFixed(3)}"/></pattern></defs><rect width="${s.width}" height="${s.height}" fill="url(#sg)"/>`);
  }
  for (const d of generateDotList(rng)) {
    if(d.size<.3||d.opacity<=.01) continue;
    const o=d.opacity<.999?` fill-opacity="${d.opacity.toFixed(2)}"`:"";;
    if(s.shape==="circle") parts.push(`<circle cx="${d.x.toFixed(1)}" cy="${d.y.toFixed(1)}" r="${(d.size/2).toFixed(2)}" fill="${d.color}"${o}/>`);
    else { const rx=s.shape==="rounded"?` rx="${(d.size*.25).toFixed(2)}"`:``; parts.push(`<rect x="${(d.x-d.size/2).toFixed(1)}" y="${(d.y-d.size/2).toFixed(1)}" width="${d.size.toFixed(2)}" height="${d.size.toFixed(2)}"${rx} fill="${d.color}"${o}/>`); }
  }
  parts.push("</svg>"); return parts.join("");
}

}

function exportPng(scale) {
  const svgBlob=new Blob([generateSVG()],{type:"image/svg+xml"});
  const url=URL.createObjectURL(svgBlob), img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    canvas.width=state.width*scale; canvas.height=state.height*scale;
    canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
    URL.revokeObjectURL(url);
    canvas.toBlob(blob=>download(blob,`dots-${state.mode}-${state.width}x${state.height}-${scale}x-seed${state.seed}.png`),"image/png");
  }; img.src=url;
}

/* ── Randomiser tout ── */
function hslToHex(h,s,l) {
  s/=100; l/=100;
  const k=n=>(n+h/30)%12, a=s*Math.min(l,1-l);
  const f=n=>{ const c=l-a*Math.max(-1,Math.min(k(n)-3,Math.min(9-k(n),1))); return Math.round(255*c).toString(16).padStart(2,"0"); };
  return "#"+f(0)+f(8)+f(4);
}
function randomPalette() {
  if(Math.random()<.35) { const keys=Object.keys(PALETTES); return [...PALETTES[keys[Math.floor(Math.random()*keys.length)]]]; }
  // Rampe tonale : même famille de teinte, clarté décroissante → palette harmonieuse avec de la profondeur
  const h0=Math.random()*360, derive=(Math.random()-.5)*50, sat=50+Math.random()*35;
  const palette=[];
  for(let i=0;i<5;i++) {
    const t=i/4, h=(h0+derive*t+360)%360;
    const l=68-t*38+(Math.random()-.5)*6;
    palette.push(hslToHex(h, Math.min(95,Math.max(30,sat+(Math.random()-.5)*10)), l));
  }
  return palette;
}

const MODE_PRESETS = {
  grid:   { sliders:{ cellSize:16, dotScale:55, sizeVar:35, density:42, clustering:55, fadeStrength:45 }, selects:{ fadeMode:"edges" } },
  disc:   { sliders:{ cellSize:14, dotScale:58, sizeVar:30, density:55, clustering:45, radiusPct:82, softEdge:35 }, selects:{ fadeMode:"none" } },
  ring:   { sliders:{ cellSize:13, dotScale:60, sizeVar:30, density:60, clustering:35, radiusPct:88, softEdge:40, ringThickness:40 }, selects:{ fadeMode:"none" } },
  spiral: { sliders:{ dotSizePx:9, sizeVar:25, count:1400, spiralSpacing:13, spiralDecay:55, opacityVar:45 }, selects:{ colorDist:"radial" } },
  sphere: { sliders:{ dotSizePx:8, sizeVar:20, count:1300, radiusPct:78, rotX:18, rotY:32, perspAmount:60, backFade:80 }, selects:{ colorDist:"depth" } },
  persp:  { sliders:{ cellSize:18, dotScale:55, sizeVar:25, density:65, horizon:32, perspStrength:60 }, selects:{ fadeMode:"none", colorDist:"depth" } },
  wave:   { sliders:{ cellSize:14, dotScale:62, sizeVar:25, density:65, clustering:15, waveFreq:5, waveAmp:85 }, selects:{ fadeMode:"none" } },
  ripple: { sliders:{ cellSize:13, dotScale:62, sizeVar:20, density:70, clustering:0, waveFreq:7, waveAmp:90 }, selects:{ fadeMode:"none", colorDist:"radial" } },
  vortex: { sliders:{ cellSize:13, dotScale:62, sizeVar:20, density:70, clustering:0, waveFreq:8, waveAmp:90 }, selects:{ fadeMode:"none", colorDist:"radial" } },
  topo:   { sliders:{ cellSize:12, dotScale:60, sizeVar:25, density:65, clustering:0, waveFreq:6, waveAmp:95 }, selects:{ fadeMode:"none" } },
};
function applyModePreset(mode) {
  const p=MODE_PRESETS[mode]; if(!p) return;
  Object.entries(p.sliders).forEach(([id,v])=>setSlider(id,v));
  Object.entries(p.selects||{}).forEach(([id,v])=>setSelect(id,v));
}
const BG_CHOICES=["#f4f5f4","#ffffff","#f7f3ec","#eef1f6","#f2ecf5","#101418","#0d1117","#12160f"];

function randomizeAll() {
  const R=(min,max)=>Math.round(min+Math.random()*(max-min)), pick=arr=>arr[Math.floor(Math.random()*arr.length)];
  document.querySelector(`#modeGrid button[data-mode="${pick(["grid","disc","ring","spiral","sphere","persp","wave","ripple","vortex","topo"])}"]`).click();
  document.querySelector(`#shapeSeg button[data-shape="${pick(["square","rounded","circle"])}"]`).click();
  setSlider("cellSize",R(10,24)); setSlider("dotScale",R(45,75)); setSlider("dotSizePx",R(5,14)); setSlider("sizeVar",R(10,55));
  setSlider("density",R(25,70)); setSlider("clustering",R(10,70));
  setSelect("fadeMode",pick(["none","edges","edges","center","top","bottom","left","right"])); setSlider("fadeStrength",R(30,70));
  setSlider("radiusPct",R(65,95)); setSlider("softEdge",R(15,55)); setSlider("ringThickness",R(25,55));
  setSlider("count",R(60,220)*10); setSlider("spiralSpacing",R(10,20)); setSlider("spiralDecay",R(-40,80));
  setSlider("rotX",R(0,360)); setSlider("rotY",R(0,360)); setSlider("perspAmount",R(30,80)); setSlider("backFade",R(55,90));
  setSlider("horizon",R(20,50)); setSlider("perspStrength",R(40,85));
  setSlider("waveFreq",R(3,10)); setSlider("waveAmp",R(65,100)); setSelect("waveDir",pick(["horizontal","vertical","diagonal","radial"]));
  state.colors=randomPalette(); renderSwatches();
  setSelect("colorDist",pick(["random","random","horizontal","vertical","radial","depth"]));
  setSlider("grayMix",R(0,45)); setSlider("opacityVar",R(25,65));
  state.bgColor=pick(BG_CHOICES); document.getElementById("bgColor").value=state.bgColor;
  state.seed=Math.floor(Math.random()*1000000); render();
}
document.getElementById("randomize").addEventListener("click", randomizeAll);

/* ── Animation accordéon ── */
document.querySelectorAll("details.group").forEach(d=>{
  const body=d.querySelector(".group-body");
  const anim=document.createElement("div");
  anim.className="group-anim";
  body.parentNode.insertBefore(anim,body);
  anim.appendChild(body);
  const summary=d.querySelector("summary");
  let busy=false;
  summary.addEventListener("click",e=>{
    e.preventDefault();
    if(busy) return;
    busy=true;
    if(d.open){
      // Fermeture : on part de 1fr → 0fr
      anim.classList.add("collapsing");
      const done=ev=>{
        if(ev.propertyName!=="grid-template-rows") return;
        anim.removeEventListener("transitionend",done);
        d.open=false;
        anim.classList.remove("collapsing");
        busy=false;
      };
      anim.addEventListener("transitionend",done);
    } else {
      // Ouverture : on rend le contenu, puis 0fr → 1fr
      anim.classList.add("collapsing");
      d.open=true;
      requestAnimationFrame(()=>requestAnimationFrame(()=>anim.classList.remove("collapsing")));
      const done=ev=>{
        if(ev.propertyName!=="grid-template-rows") return;
        anim.removeEventListener("transitionend",done);
        busy=false;
      };
      anim.addEventListener("transitionend",done);
    }
  });
});

/* ── Init ── */
document.querySelectorAll("#modeGrid button, #shapeSeg button").forEach(b=>b.setAttribute("aria-pressed", b.classList.contains("active") ? "true" : "false"));
renderSwatches();
applyModePreset(state.mode);
updateVisibility();
render();
</script>
</body>
